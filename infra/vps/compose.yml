name: deploylite

services:
  traefik:
    # v3.6.7 ships a Docker v28.3.3 client (API 1.51), compatible with Docker 29.
    image: traefik:v3.6.7
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - deploylite
  postgres:
    profiles: [bootstrap, runtime]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deploylite}
      POSTGRES_USER: ${POSTGRES_USER:-deploylite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - deploylite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-deploylite} -d $${POSTGRES_DB:-deploylite}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    profiles: [bootstrap, runtime]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: deploylite-api:local
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    command: ["node", "packages/db/scripts/migrate.mjs"]
    networks:
      - deploylite

  api:
    profiles: [bootstrap, runtime]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: deploylite-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DEPLOYLITE_API_HOST: 0.0.0.0
      DEPLOYLITE_API_PORT: 3001
      DEPLOYLITE_API_URL: http://api:3001
      DEPLOYLITE_CORS_ORIGIN: https://${DEPLOYLITE_PUBLIC_HOST:-deploylite.invalid}
      DEPLOYLITE_SESSION_TTL_SECONDS: ${DEPLOYLITE_SESSION_TTL_SECONDS:-28800}
      DEPLOYLITE_SESSION_COOKIE_NAME: ${DEPLOYLITE_SESSION_COOKIE_NAME:-deploylite_session}
      DEPLOYLITE_SESSION_COOKIE_SECURE: "true"
      DEPLOYLITE_BCRYPT_COST: ${DEPLOYLITE_BCRYPT_COST:-12}
      DEPLOYLITE_SECRET_KEY: ${DEPLOYLITE_SECRET_KEY:?DEPLOYLITE_SECRET_KEY is required}
    networks:
      - deploylite
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    profiles: [bootstrap, runtime]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: deploylite-web:local
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEPLOYLITE_WEB_API_BASE_URL: https://${DEPLOYLITE_PUBLIC_HOST:-deploylite.invalid}
      NEXT_PUBLIC_DEPLOYLITE_API_URL: https://${DEPLOYLITE_PUBLIC_HOST:-deploylite.invalid}
    networks:
      - deploylite
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:

networks:
  deploylite:
    driver: bridge
