name: deploylite

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks:
      - deploylite
  postgres:
    image: postgres:16-alpine
    profiles: [runtime]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deploylite}
      POSTGRES_USER: ${POSTGRES_USER:-deploylite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - deploylite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-deploylite} -d $${POSTGRES_DB:-deploylite}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: deploylite-api:local
    profiles: [runtime]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-deploylite}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-deploylite}
    command: ["node", "packages/db/scripts/migrate.mjs"]
    networks:
      - deploylite

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: deploylite-api:local
    profiles: [runtime]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-deploylite}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-deploylite}
      DEPLOYLITE_API_HOST: 0.0.0.0
      DEPLOYLITE_API_PORT: 3001
      DEPLOYLITE_API_URL: http://api:3001
      DEPLOYLITE_CORS_ORIGIN: ${DEPLOYLITE_PUBLIC_WEB_ORIGIN:-http://deploylite.com}
      DEPLOYLITE_SECRET_KEY: ${DEPLOYLITE_SECRET_KEY:?DEPLOYLITE_SECRET_KEY is required}
      DEPLOYLITE_SESSION_TTL_SECONDS: ${DEPLOYLITE_SESSION_TTL_SECONDS:-28800}
      DEPLOYLITE_SESSION_COOKIE_NAME: ${DEPLOYLITE_SESSION_COOKIE_NAME:-deploylite_session}
      DEPLOYLITE_SESSION_COOKIE_SECURE: "true"
      DEPLOYLITE_BCRYPT_COST: ${DEPLOYLITE_BCRYPT_COST:-12}
    labels:
      - traefik.enable=true
      - traefik.http.routers.deploylite-api.rule=Host(`${DEPLOYLITE_DOMAIN:-deploylite.com}`) && PathPrefix(`/api`)
      - traefik.http.routers.deploylite-api.entrypoints=web
      - traefik.http.routers.deploylite-api.priority=100
      - traefik.http.services.deploylite-api.loadbalancer.server.port=3001
    networks:
      - deploylite
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: deploylite-web:local
    profiles: [runtime]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    labels:
      - traefik.enable=true
      - traefik.http.routers.deploylite-web.rule=Host(`${DEPLOYLITE_DOMAIN:-deploylite.com}`)
      - traefik.http.routers.deploylite-web.entrypoints=web
      - traefik.http.services.deploylite-web.loadbalancer.server.port=3000
    networks:
      - deploylite
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  traefik-acme:

networks:
  deploylite:
    driver: bridge
